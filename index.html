#ff9100
);
}
  

.section{
padding:60px 20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#111;
padding:30px;
border-radius:20px;

.card img{
width:100%;
border-radius:20px;
